<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CarbonLens</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <svg class="logo" viewBox="0 0 24 24" fill="#2e7d32" aria-hidden="true" width="22" height="22">
      <path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 008 20C19 20 22 3 22 3c-1 2-8 2-8 2v-1h-1z"/>
    </svg>
    <h1>CarbonLens</h1>
  </header>

  <main>
    <section class="summary-card" aria-label="Session summary">
      <div id="loading" class="loading">Loading…</div>
      <div id="summary" class="hidden">
        <div class="total-row">
          <span class="total-label">Session total</span>
          <span class="total-value" id="total-kg">— kg CO₂e</span>
        </div>
        <div class="meta-row">
          <span id="product-count">0 products viewed</span>
          <span id="top-category" class="muted"></span>
        </div>
        <div class="equivalences" id="equivalences" aria-label="Emissions equivalences"></div>
      </div>
      <div id="empty" class="hidden">
        <p class="muted center">No products viewed yet this session.</p>
        <p class="muted center small">Visit an Amazon or Walmart product page to get started.</p>
      </div>
    </section>

    <button id="reset-btn" class="reset-btn" type="button">Reset session</button>
  </main>

  <footer class="footer">
    <span>v0.1.0</span>
    <a href="#" id="methodology-link">Methodology</a>
    <a href="https://github.com/foj227/CarbonLens" target="_blank" rel="noopener noreferrer">Source</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
